<!doctype html>
<html lang="en" data-bs-theme="dark" data-color-scheme="tinted">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-bs-theme', t);
				var s = localStorage.getItem('colorScheme');
				if (s === 'tinted' || s === 'neutral') document.documentElement.setAttribute('data-color-scheme', s);
			} catch(e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
